name: Hexo Deploy

on:
  push:
    branches:
      - main  # 设置为你的Hexo源码所在的分支

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: false  # 如果使用子模块，请启用

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '23.3'  # 设置为您使用的Node.js版本

    - name: Cache NPM dependencies
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Dependencies
      run: npm install

    - name: Hexo Generate
      run: npm run generate

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        cname: 'blog.yuanzhou.site'
